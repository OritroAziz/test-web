<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brightside Health</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* --- full CSS from your original file stays here --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --teal-light: #e2c8f0; --teal-mid: #9c5ecf; --teal-cta: #a72dd4; --navy: #6e1e66; --navy-mid: #742d8e; --navy-soft: #7f4aa5; --white: #ffffff; --off-white: #f4fbfb; --text-body: #443751; --text-muted: #6b7280; --radius-pill: 9999px; --radius-lg: 1rem; --shadow-card: 0 8px 32px rgba(30,58,110,.10); }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; color: var(--text-body); background: var(--white); overflow-x: hidden; }
    /* ... all other CSS from your original file ... */
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <a href="#">Getting Started</a>
    <a href="#">Learn More</a>
    <a href="#">For Clinicians</a>
    <a href="#">For Partners</a>
  </div>
  <a href="#" class="logo">
    <div class="logo-star"></div>
    <span><strong>Brightside</strong> Health</span>
  </a>
  <div class="nav-right" id="nav-auth-area">
    <a href="#">Refer a Patient</a>
    <button class="btn-outline" onclick="openModal('login')">Member Login</button>
    <button class="btn-cta" onclick="openModal('register')">Free Assessment</button>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div id="main-content">
  <div id="public-site">
    <!-- HERO, TRUST BAR, HOW IT WORKS, etc. stays same as your original HTML -->
  </div>

  <div id="dashboard" style="display:none;">
    <!-- DASHBOARD CONTENT goes here -->
  </div>
</div>

<!-- MODALS -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal" id="auth-modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHfC22LtBnqEMvwefZCvTljGn0aGyOtks",
    authDomain: "test-c6f3a.firebaseapp.com",
    projectId: "test-c6f3a",
    storageBucket: "test-c6f3a.appspot.com",
    messagingSenderId: "517623383300",
    appId: "1:517623383300:web:4fd1f5ea447bc7604f7c51",
    measurementId: "G-PF9RXBYW02"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const navAuthArea = document.getElementById('nav-auth-area');

  function showToast(message, type='') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast show ${type}`;
    setTimeout(() => { toast.className = 'toast'; }, 3000);
  }

  function openModal(mode) {
    document.getElementById('modal-overlay').classList.add('open');
    const modalContent = document.getElementById('modal-content');
    if(mode==='login') {
      modalContent.innerHTML = `
        <h2 class='modal-title'>Member Login</h2>
        <input id='email' type='email' placeholder='Email' class='form-input'/>
        <input id='password' type='password' placeholder='Password' class='form-input'/>
        <button onclick='loginUser()' class='btn-submit'>Login</button>
        <button onclick='loginWithGoogle()' class='btn-google'>Sign in with Google</button>
      `;
    } else {
      modalContent.innerHTML = `
        <h2 class='modal-title'>Register</h2>
        <input id='email' type='email' placeholder='Email' class='form-input'/>
        <input id='password' type='password' placeholder='Password' class='form-input'/>
        <button onclick='registerUser()' class='btn-submit'>Register</button>
      `;
    }
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  async function loginUser() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
      closeModal();
      showToast('Logged in successfully', 'success');
    } catch (err) {
      showToast(err.message, 'error-toast');
    }
  }

  async function registerUser() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      await createUserWithEmailAndPassword(auth, email, password);
      closeModal();
      showToast('Registered successfully', 'success');
    } catch (err) {
      showToast(err.message, 'error-toast');
    }
  }

  async function loginWithGoogle() {
    try {
      await signInWithPopup(auth, provider);
      closeModal();
      showToast('Logged in with Google', 'success');
    } catch (err) {
      showToast(err.message, 'error-toast');
    }
  }

  function logoutUser() {
    signOut(auth).then(() => {
      showToast('Logged out', 'success');
    });
  }

  onAuthStateChanged(auth, user => {
    if(user) {
      navAuthArea.innerHTML = `<div class='nav-user' onclick='toggleUserDropdown()'>
        <div class='user-avatar'>${user.email[0].toUpperCase()}</div>
        <span class='user-name'>${user.email}</span>
        <div class='user-dropdown' id='user-dropdown'>
          <div class='dropdown-item' onclick='logoutUser()'>Logout</div>
        </div>
      </div>`;
    } else {
      navAuthArea.innerHTML = `
        <a href='#'>Refer a Patient</a>
        <button class='btn-outline' onclick="openModal('login')">Member Login</button>
        <button class='btn-cta' onclick="openModal('register')">Free Assessment</button>
      `;
    }
  });

  function toggleUserDropdown() {
    document.getElementById('user-dropdown').classList.toggle('open');
  }
</script>
</body>
</html>
